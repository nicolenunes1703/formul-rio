<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Cadastro Stark Industries</title>

<style>

body{
font-family:Arial;
background:#eee;
}

.container{
width:700px;
margin:auto;
background:white;
padding:20px;
}

input,select,textarea{
width:100%;
margin-bottom:10px;
padding:8px;
}

button{
padding:10px;
}

</style>
</head>

<body>

<div class="container">

<h1>Cadastro Stark Industries</h1>

<form>

<input type="text" placeholder="Nome">

<input type="email" placeholder="Email">

<input type="password" placeholder="Senha">

<input type="number" placeholder="Idade">

<input type="date">

<input type="tel" placeholder="Telefone">

<input type="color">

<select>
<option>homem</option>
<option>mulher</option>
<option>prefiro não dizer</option>
</select>

<p>Escolha seu herói:</p>

<input type="radio" name="heroi"> Homem-Aranha


<input type="radio" name="heroi"> Homem de Ferro

<p>Poderes favoritos:</p>

<input type="checkbox"> Força
<br>

<input type="checkbox"> Velocidade
<br>

<textarea rows="5"></textarea>

<button>Enviar</button>

</form>

</div>

</body>
</html>
