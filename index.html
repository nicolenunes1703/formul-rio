<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Cadastro Stark Industries</title>

<style>

body{
    font-family: Arial, sans-serif;
    background: #eee;
}

.container{
    width: 700px;
    margin: auto;
    background: white;
    padding: 20px;
    border-radius: 10px;
}

/* Apenas os campos principais ocupam 100% */
input[type="text"],
input[type="email"],
input[type="password"],
input[type="number"],
input[type="date"],
input[type="tel"],
input[type="color"],
select,
textarea{
    width: 100%;
    padding: 8px;
    margin-bottom: 10px;
    box-sizing: border-box;
}

/* Radio e checkbox alinhados */
.radio-group,
.checkbox-group{
    margin-bottom: 15px;
}

.radio-group label,
.checkbox-group label{
    display: block;
    margin: 5px 0;
}

.radio-group input,
.checkbox-group input{
    width: auto;
    margin-right: 5px;
}

button{
    padding: 10px;
    background: #c62828;
    color: white;
    border: none;
    cursor: pointer;
}

button:hover{
    background: #8e0000;
}

</style>
</head>

<body>

<div class="container">

<h1>Cadastro Stark Industries</h1>

<form>

<input type="text" placeholder="Nome">

<input type="email" placeholder="Email">

<input type="password" placeholder="Senha">

<input type="number" placeholder="Idade">

<input type="date">

<input type="tel" placeholder="Telefone">

<input type="color">

<select>
<option>homem</option>
<option>mulher</option>
<option>prefiro não dizer</option>
</select>

<p>Escolha seu herói:</p>

<div class="radio-group">

<label>
    <input type="radio" name="heroi">
    Homem-Aranha
</label>

<label>
    <input type="radio" name="heroi">
    Homem de Ferro
</label>

</div>

<p>Poderes favoritos:</p>

<div class="checkbox-group">

<label>
    <input type="checkbox">
    Força
</label>

<label>
    <input type="checkbox">
    Velocidade
</label>

<br>
<p> comentários/sugestões: </p>
<textarea rows="5"></textarea>

<button>Enviar</button>

</form>

</div>

</body>
</html>
